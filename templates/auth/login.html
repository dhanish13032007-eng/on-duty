<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart OD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --bg: #060807;
            --surface: #0d1411;
            --surface-2: #131e1a;
            --border: #20342b;
            --text: #f8fafc;
            --text-2: #94a3b8;
            --text-3: #475569;
            --danger: #f43f5e;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--surface-2), var(--bg) 70%);
        }
        .auth-card {
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
            position: relative;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .auth-logo-icon {
            width: 50px; height: 50px;
            background: var(--surface-2);
            border: 1px solid var(--primary);
            border-radius: 0.625rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .auth-logo-icon svg { color: var(--primary); width: 24px; height: 24px; }
        .auth-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.5rem; text-align: center; }
        .auth-subtitle { font-size: 0.85rem; color: var(--text-3); margin-bottom: 2rem; text-align: center; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label {
            display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.5rem; color: var(--text-2);
        }
        .form-control {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border);
            border-radius: 0.375rem; font-family: inherit; font-size: 0.9rem;
            color: var(--text); background: var(--surface-2); outline: none; transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary); background: var(--bg);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }
        .btn-primary {
            width: 100%; padding: 0.75rem; background: rgba(16, 185, 129, 0.15);
            color: var(--primary); border: 1px solid var(--primary); border-radius: 0.375rem;
            font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-primary:hover {
            background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow);
        }
        .flash-messages { margin-bottom: 1.5rem; }
        .flash { padding: 1rem; border-radius: 0.375rem; font-size: 0.85rem; background: var(--surface-2); margin-bottom: 0.5rem; border: 1px solid transparent; }
        .flash.error { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 15px rgba(244, 63, 94, 0.15); }
        .flash.success { border-color: var(--success); color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div>
                <span style="font-size:1.5rem; font-weight:900;">SMART OD</span>
            </div>
        </div>

        <h1 class="auth-title">Staff Portal</h1>
        <p class="auth-subtitle">Login for HOD and Admin</p>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Admin / HOD Username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
